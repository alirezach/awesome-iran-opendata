name: Rebuild README from CSVs

on:
  push:
    paths:
      - 'data/**.csv'
      - 'README.template.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate README
        run: python scripts/generate_readme.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: regenerate README from CSV data [skip ci]'
          file_pattern: README.md
